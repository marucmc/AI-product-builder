<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로또 번호 추천</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5c842;
      --gold-light: #ffe98a;
      --red: #ff4e4e;
      --orange: #ff8c00;
      --blue: #3a9bdc;
      --green: #3ecf5e;
      --purple: #b44fff;
      --bg: #0a0a14;
      --card: #12121f;
      --border: rgba(245,200,66,0.18);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
    }

    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(1); }
      to   { opacity: 0.9; transform: scale(1.4); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      padding: 48px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* Header */
    header {
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: linear-gradient(90deg, var(--gold), var(--orange));
      color: #000;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    header h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2.4rem, 7vw, 3.8rem);
      line-height: 1;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--orange) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      text-shadow: none;
    }
    header p {
      margin-top: 12px;
      font-size: 0.92rem;
      color: rgba(255,255,255,0.45);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    /* Button */
    .btn-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    button#draw {
      cursor: pointer;
      border: none;
      position: relative;
      padding: 0;
      border-radius: 60px;
      background: transparent;
      font-size: 1rem;
    }
    .btn-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #f5c842 0%, #ff8c00 60%, #ff4e4e 100%);
      color: #000;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.06em;
      padding: 18px 50px;
      border-radius: 60px;
      transition: transform 0.18s, filter 0.18s;
      box-shadow: 0 0 40px rgba(245,200,66,0.35), 0 4px 20px rgba(0,0,0,0.5);
    }
    button#draw:hover .btn-inner {
      filter: brightness(1.12);
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 0 60px rgba(245,200,66,0.6);
    }
    button#draw:active .btn-inner {
      transform: translateY(1px) scale(0.98);
    }
    .btn-icon {
      font-size: 1.3rem;
      animation: spin-slow 6s linear infinite;
    }
    @keyframes spin-slow {
      to { transform: rotate(360deg); }
    }

    /* Result card */
    .result-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s, transform 0.5s;
    }
    .result-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .row-label {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      font-weight: 700;
    }

    /* Number row */
    .numbers-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .plus-sign {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.25);
      flex-shrink: 0;
    }
    .ball {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.05rem;
      color: #fff;
      position: relative;
      flex-shrink: 0;
      opacity: 0;
      transform: scale(0.4) rotate(-30deg);
      transition: opacity 0.35s, transform 0.35s;
      box-shadow: 0 3px 14px rgba(0,0,0,0.45);
    }
    .ball::after {
      content: '';
      position: absolute;
      top: 7px; left: 11px;
      width: 14px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: rotate(-35deg);
    }
    .ball.show {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }
    /* Ball colors by range */
    .ball.r1  { background: linear-gradient(145deg, #ffd740, #e6a800); color: #000; }
    .ball.r2  { background: linear-gradient(145deg, #5bc0ff, #1878d0); }
    .ball.r3  { background: linear-gradient(145deg, #ff7c7c, #c92020); }
    .ball.r4  { background: linear-gradient(145deg, #b0b0b0, #555); }
    .ball.r5  { background: linear-gradient(145deg, #72e88f, #1b9438); }
    .ball.bonus {
      background: linear-gradient(145deg, var(--purple), #7b00cc);
      box-shadow: 0 0 18px rgba(180,79,255,0.5);
    }

    /* Stats */
    .stats-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      min-width: 90px;
    }
    .stat-chip .val {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.1rem;
      color: var(--gold);
    }
    .stat-chip .lbl {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.08em;
    }

    /* Multi sets */
    .sets-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
    }
    .set-row {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px 20px;
    }
    .set-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .set-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }
    .copy-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
      font-size: 0.68rem;
      padding: 3px 10px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }

    .set-numbers {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .small-ball {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 0.88rem;
      color: #fff;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.3s, transform 0.3s;
      position: relative;
    }
    .small-ball::after {
      content: '';
      position: absolute;
      top: 5px; left: 8px;
      width: 10px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      transform: rotate(-35deg);
    }
    .small-ball.show { opacity: 1; transform: scale(1); }

    /* controls row */
    .controls {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .ctrl-btn {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.82rem;
      padding: 12px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .ctrl-btn.active {
      background: rgba(245,200,66,0.15);
      border-color: rgba(245,200,66,0.4);
      color: var(--gold);
    }

    /* History */
    .history-section {
      width: 100%;
    }
    .history-title {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 12px;
      font-weight: 700;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: none; } }
    .history-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      border-radius: 50%;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 0.75rem;
      color: #fff;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,50,0.95);
      border: 1px solid rgba(245,200,66,0.3);
      color: var(--gold);
      font-size: 0.85rem;
      padding: 12px 24px;
      border-radius: 30px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <header>
    <div class="badge">✨ Lucky Number Generator</div>
    <h1>로또 번호<br>추천기</h1>
    <p>버튼을 누르면 5게임을 한번에 추천해드려요!</p>
  </header>

  <div class="btn-wrap">
    <button id="draw" onclick="drawNumbers()">
      <div class="btn-inner">
        <span class="btn-icon">🎱</span>
        번호 추첨하기
      </div>
    </button>
  </div>

  <!-- 5-game result -->
  <div class="result-card" id="multi-card" style="display:none;">
    <div class="row-label">추천 번호 세트</div>
    <div class="sets-grid" id="sets-grid"></div>
  </div>

  <div class="divider" id="history-divider" style="display:none;"></div>

  <!-- History -->
  <div class="history-section" id="history-section" style="display:none;">
    <div class="history-title">📋 최근 추첨 기록</div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*5).toFixed(1)}s`;
    starsEl.appendChild(s);
  }

  let history = [];

  function drawNumbers() {
    drawMulti(5);
  }

    if (n <= 20) return 'r2';
    if (n <= 30) return 'r3';
    if (n <= 40) return 'r4';
    return 'r5';
  }

  function genSet() {
    const pool = Array.from({length:45}, (_,i)=>i+1);
    const picked = [];
    while (picked.length < 6) {
      const idx = Math.floor(Math.random() * pool.length);
      picked.push(pool.splice(idx, 1)[0]);
    }
    picked.sort((a,b)=>a-b);
    // bonus
    let bonus;
    do { bonus = Math.floor(Math.random()*45)+1; } while (picked.includes(bonus));
    return { nums: picked, bonus };
  }

  function sumDigits(arr) { return arr.reduce((a,b)=>a+b,0); }

  function drawNumbers() {
    drawMulti(5);
  }

  function drawMulti(count) {
    const sets = Array.from({length:count}, genSet);
    const multiCard = document.getElementById('multi-card');

    multiCard.style.display = '';
    multiCard.classList.remove('visible');
    setTimeout(() => multiCard.classList.add('visible'), 10);

    const grid = document.getElementById('sets-grid');
    grid.innerHTML = '';

    sets.forEach(({nums, bonus}, si) => {
      const row = document.createElement('div');
      row.className = 'set-row';
      row.innerHTML = `
        <div class="set-header">
          <span class="set-label">게임 ${si+1}</span>
          <button class="copy-btn" onclick="copySet(${JSON.stringify(nums)}, ${bonus}, this)">복사</button>
        </div>
        <div class="set-numbers" id="set-nums-${si}"></div>
      `;
      grid.appendChild(row);

      const numRow = row.querySelector(`#set-nums-${si}`);
      nums.forEach((n, ni) => {
        const b = document.createElement('div');
        b.className = `small-ball ${ballClass(n)}`;
        b.style.background = ballBg(n);
        b.textContent = n;
        numRow.appendChild(b);
        setTimeout(()=>b.classList.add('show'), si*60 + ni*80 + 200);
      });
      // bonus
      const bb = document.createElement('div');
      bb.className = 'small-ball bonus';
      bb.style.background = 'linear-gradient(145deg, #b44fff, #7b00cc)';
      bb.textContent = bonus;
      numRow.appendChild(bb);
      setTimeout(()=>bb.classList.add('show'), si*60 + 6*80 + 200);

      addHistory(nums, bonus);
    });
  }

  function ballBg(n) {
    if (n <= 10) return 'linear-gradient(145deg,#ffd740,#e6a800)';
    if (n <= 20) return 'linear-gradient(145deg,#5bc0ff,#1878d0)';
    if (n <= 30) return 'linear-gradient(145deg,#ff7c7c,#c92020)';
    if (n <= 40) return 'linear-gradient(145deg,#b0b0b0,#555)';
    return 'linear-gradient(145deg,#72e88f,#1b9438)';
  }

  function addHistory(nums, bonus) {
    history.unshift({ nums: [...nums], bonus, time: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) });
    if (history.length > 5) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('history-section');
    const divider = document.getElementById('history-divider');
    const list = document.getElementById('history-list');
    section.style.display = '';
    divider.style.display = '';
    list.innerHTML = '';
    history.forEach(({nums, bonus, time}) => {
      const item = document.createElement('div');
      item.className = 'history-item';
      const numsHtml = nums.map(n=>`<span class="history-num" style="background:${ballBg(n)}">${n}</span>`).join('');
      const bonusHtml = `<span class="history-num" style="background:linear-gradient(145deg,#b44fff,#7b00cc)">${bonus}</span>`;
      item.innerHTML = `${numsHtml}<span style="color:rgba(255,255,255,0.2);padding:0 2px">+</span>${bonusHtml}<span style="margin-left:auto;font-size:0.7rem">${time}</span>`;
      list.appendChild(item);
    });
  }

  function copySet(nums, bonus, btn) {
    const text = `${nums.join(', ')} + ${bonus}`;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ 복사됨';
      showToast('번호가 클립보드에 복사되었습니다!');
      setTimeout(() => btn.textContent = '복사', 2000);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
