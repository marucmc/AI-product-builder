<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>제휴 문의 | 로또 번호 추천기</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5c842;
      --gold-light: #ffe98a;
      --orange: #ff8c00;
      --bg: #0a0a14;
      --card: #12121f;
      --border: rgba(245,200,66,0.18);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    /* Stars */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
      transition: background 0.4s;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(1); }
      to   { opacity: 0.9; transform: scale(1.4); }
    }

    /* Theme Toggle */
    .theme-toggle {
      position: fixed;
      top: 20px; right: 20px;
      z-index: 200;
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .theme-toggle:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      padding: 48px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* Back link */
    .back-link {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.4);
      font-size: 0.82rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }

    /* Header */
    header { text-align: center; }
    .badge {
      display: inline-block;
      background: linear-gradient(90deg, var(--gold), var(--orange));
      color: #000;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    header h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.1;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--orange) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      margin-top: 12px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.45);
      font-weight: 300;
      line-height: 1.6;
      transition: color 0.4s;
    }

    /* Form Card */
    .form-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      transition: background 0.4s, border-color 0.4s;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 22px;
    }
    .form-group:last-of-type { margin-bottom: 0; }

    label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      transition: color 0.4s;
    }
    label span.req { color: var(--gold); margin-left: 3px; }

    input, textarea, select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, color 0.4s;
      width: 100%;
    }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.2); }
    input:focus, textarea:focus, select:focus {
      border-color: rgba(245,200,66,0.5);
      background: rgba(255,255,255,0.07);
    }
    textarea { resize: vertical; min-height: 130px; line-height: 1.6; }
    select option { background: #1a1a2e; color: #fff; }

    /* Submit Button */
    .submit-wrap { margin-top: 30px; }
    .submit-btn {
      width: 100%;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, #f5c842 0%, #ff8c00 60%, #ff4e4e 100%);
      color: #000;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.06em;
      padding: 18px;
      border-radius: 60px;
      transition: transform 0.18s, filter 0.18s, opacity 0.2s;
      box-shadow: 0 0 40px rgba(245,200,66,0.3), 0 4px 20px rgba(0,0,0,0.4);
    }
    .submit-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }
    .submit-btn:active { transform: translateY(1px); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Success / Error */
    .result-msg {
      display: none;
      text-align: center;
      padding: 20px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-top: 20px;
    }
    .result-msg.success {
      display: block;
      background: rgba(62,207,94,0.12);
      border: 1px solid rgba(62,207,94,0.3);
      color: #6ef08c;
    }
    .result-msg.error {
      display: block;
      background: rgba(255,78,78,0.1);
      border: 1px solid rgba(255,78,78,0.3);
      color: #ff8a8a;
    }

    /* ===== LIGHT MODE ===== */
    body.light { --bg: #f2f2fa; --card: #ffffff; --border: rgba(100,100,200,0.18); color: #1a1a2e; background: var(--bg); }
    body.light .star { background: #c0c0e0; }
    body.light header p { color: rgba(26,26,46,0.5); }
    body.light label { color: rgba(26,26,46,0.5); }
    body.light input, body.light textarea, body.light select {
      background: rgba(26,26,46,0.04);
      border-color: rgba(26,26,46,0.12);
      color: #1a1a2e;
    }
    body.light input::placeholder, body.light textarea::placeholder { color: rgba(26,26,46,0.25); }
    body.light input:focus, body.light textarea:focus, body.light select:focus {
      border-color: rgba(180,120,0,0.4);
      background: rgba(26,26,46,0.06);
    }
    body.light select option { background: #f2f2fa; color: #1a1a2e; }
    body.light .back-link { color: rgba(26,26,46,0.4); }
    body.light .back-link:hover { color: #8a6000; }
    body.light .form-card { box-shadow: 0 8px 40px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9); }
    body.light .theme-toggle { background: rgba(26,26,46,0.08); border-color: rgba(26,26,46,0.18); color: #1a1a2e; }
    body.light .theme-toggle:hover { background: rgba(26,26,46,0.14); }
    body.light .result-msg.success { background: rgba(30,120,50,0.08); color: #1a7a38; }
    body.light .result-msg.error { background: rgba(180,40,40,0.08); color: #b02020; }
  </style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="테마 변경">🌙</button>
<div class="stars" id="stars"></div>

<div class="container">
  <a href="index.html" class="back-link">← 로또 추천기로 돌아가기</a>

  <header>
    <div class="badge">🤝 Partnership</div>
    <h1>제휴 문의</h1>
    <p>광고, 협찬, 콘텐츠 협업 등<br>다양한 제휴 제안을 기다립니다.</p>
  </header>

  <div class="form-card">
    <form id="contactForm" action="https://formspree.io/f/xaqpnjzw" method="POST">

      <div class="form-group">
        <label for="name">이름 / 담당자 <span class="req">*</span></label>
        <input type="text" id="name" name="name" placeholder="홍길동" required />
      </div>

      <div class="form-group">
        <label for="email">이메일 <span class="req">*</span></label>
        <input type="email" id="email" name="email" placeholder="example@company.com" required />
      </div>

      <div class="form-group">
        <label for="company">회사 / 브랜드명</label>
        <input type="text" id="company" name="company" placeholder="(주)예시컴퍼니" />
      </div>

      <div class="form-group">
        <label for="type">문의 유형 <span class="req">*</span></label>
        <select id="type" name="type" required>
          <option value="" disabled selected>문의 유형을 선택해주세요</option>
          <option value="광고">광고</option>
          <option value="협찬">협찬</option>
          <option value="콘텐츠 협업">콘텐츠 협업</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">문의 내용 <span class="req">*</span></label>
        <textarea id="message" name="message" placeholder="제휴 목적, 예산 규모, 희망 일정 등 자유롭게 작성해주세요." required></textarea>
      </div>

      <div class="submit-wrap">
        <button type="submit" class="submit-btn" id="submitBtn">문의 보내기 ✉️</button>
      </div>

      <div class="result-msg" id="resultMsg"></div>
    </form>
  </div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*5).toFixed(1)}s`;
    starsEl.appendChild(s);
  }

  // Theme toggle
  let isLight = false;
  function toggleTheme() {
    isLight = !isLight;
    document.body.classList.toggle('light', isLight);
    document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
  }

  // Form submit
  const form = document.getElementById('contactForm');
  const btn = document.getElementById('submitBtn');
  const resultMsg = document.getElementById('resultMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = '전송 중...';
    resultMsg.className = 'result-msg';

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        resultMsg.className = 'result-msg success';
        resultMsg.textContent = '✅ 문의가 성공적으로 전송되었습니다! 빠른 시일 내에 답변 드리겠습니다.';
        form.reset();
        btn.textContent = '전송 완료 ✓';
      } else {
        throw new Error();
      }
    } catch {
      resultMsg.className = 'result-msg error';
      resultMsg.textContent = '❌ 전송에 실패했습니다. 잠시 후 다시 시도해주세요.';
      btn.disabled = false;
      btn.textContent = '문의 보내기 ✉️';
    }
  });
</script>
</body>
</html>
