<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶🐱 나는 강아지상? 고양이상? - 동물상 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF6B9D;
    --yellow: #FFD93D;
    --mint: #6BCB77;
    --sky: #4D96FF;
    --purple: #C77DFF;
    --orange: #FF9F1C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Gaegu', cursive;
    background: #FFF9F0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #FF6B9D, #C77DFF);
    padding: 20px;
    text-align: center;
    position: relative;
  }
  .back-btn {
    position: absolute;
    left: 20px; top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.25);
    border: none;
    border-radius: 50px;
    padding: 8px 18px;
    font-family: 'Jua', sans-serif;
    font-size: 1rem;
    color: white;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.4); }
  .header-title {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-sub {
    font-family: 'Jua', sans-serif;
    color: rgba(255,255,255,0.9);
    font-size: 1.1rem;
    margin-top: 6px;
  }

  /* ── MAIN ── */
  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── STEPS ── */
  .step-card {
    background: white;
    border-radius: 28px;
    padding: 36px 28px;
    box-shadow: 0 6px 30px rgba(255,107,157,0.12);
    margin-bottom: 24px;
    text-align: center;
  }
  .step-title {
    font-family: 'Jua', sans-serif;
    font-size: 1.5rem;
    color: #444;
    margin-bottom: 8px;
  }
  .step-desc {
    font-family: 'Jua', sans-serif;
    font-size: 1rem;
    color: #aaa;
    margin-bottom: 24px;
  }

  /* ── WEBCAM ── */
  #webcam-wrap {
    position: relative;
    display: inline-block;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(255,107,157,0.25);
    margin-bottom: 20px;
  }
  #webcam-wrap canvas {
    display: block;
    width: 280px !important;
    height: 280px !important;
    object-fit: cover;
  }
  #upload-preview {
    width: 280px;
    height: 280px;
    object-fit: cover;
    border-radius: 20px;
    display: none;
    box-shadow: 0 4px 20px rgba(255,107,157,0.25);
    margin-bottom: 20px;
  }
  .cam-placeholder {
    width: 280px;
    height: 280px;
    background: linear-gradient(135deg, #FFF0F5, #F0F0FF);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    margin: 0 auto 20px;
    border: 3px dashed #FFD93D;
  }
  .cam-placeholder p {
    font-family: 'Jua', sans-serif;
    font-size: 1rem;
    color: #bbb;
    margin-top: 10px;
  }

  /* ── BUTTONS ── */
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .btn-main {
    background: linear-gradient(135deg, #FF6B9D, #C77DFF);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 28px;
    font-family: 'Jua', sans-serif;
    font-size: 1.15rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(255,107,157,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-main:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(255,107,157,0.5); }
  .btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-outline {
    background: white;
    color: #FF6B9D;
    border: 2px solid #FF6B9D;
    border-radius: 50px;
    padding: 13px 26px;
    font-family: 'Jua', sans-serif;
    font-size: 1.15rem;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-outline:hover { background: #FFF0F5; transform: scale(1.05); }
  .upload-label {
    background: white;
    color: #4D96FF;
    border: 2px solid #4D96FF;
    border-radius: 50px;
    padding: 13px 26px;
    font-family: 'Jua', sans-serif;
    font-size: 1.15rem;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .upload-label:hover { background: #F0F5FF; transform: scale(1.05); }

  /* ── LOADING ── */
  .loading {
    display: none;
    font-family: 'Jua', sans-serif;
    font-size: 1.3rem;
    color: #FF6B9D;
    padding: 20px;
    animation: pulse 1s ease infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* ── RESULT ── */
  #result-section { display: none; }
  .result-card {
    background: white;
    border-radius: 28px;
    padding: 40px 28px;
    box-shadow: 0 6px 30px rgba(255,107,157,0.15);
    text-align: center;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .result-animal {
    font-size: 6rem;
    margin-bottom: 12px;
    animation: bounce 0.8s ease;
  }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 70% { transform: translateY(-8px); } }
  .result-title {
    font-family: 'Pacifico', cursive;
    font-size: clamp(2rem, 6vw, 3.2rem);
    margin-bottom: 8px;
  }
  .result-title.dog { color: #FF9F1C; }
  .result-title.cat { color: #C77DFF; }
  .result-badge {
    display: inline-block;
    padding: 8px 22px;
    border-radius: 50px;
    font-family: 'Jua', sans-serif;
    font-size: 1rem;
    color: white;
    margin-bottom: 20px;
  }
  .result-badge.dog { background: linear-gradient(135deg, #FF9F1C, #FFD93D); color: #333; }
  .result-badge.cat { background: linear-gradient(135deg, #C77DFF, #FF6B9D); }
  .result-desc {
    font-family: 'Jua', sans-serif;
    font-size: 1.2rem;
    color: #555;
    line-height: 1.9;
    margin-bottom: 24px;
    text-align: left;
    background: #FFF8FC;
    border-radius: 16px;
    padding: 20px 24px;
  }
  .result-desc li { list-style: none; padding: 2px 0; }

  /* ── CONFIDENCE BAR ── */
  .confidence-wrap {
    margin-bottom: 28px;
    text-align: left;
  }
  .confidence-label {
    font-family: 'Jua', sans-serif;
    font-size: 1rem;
    color: #888;
    margin-bottom: 10px;
  }
  .bar-row { margin-bottom: 12px; }
  .bar-name {
    font-family: 'Jua', sans-serif;
    font-size: 1rem;
    color: #555;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }
  .bar-track {
    background: #F0F0F0;
    border-radius: 50px;
    height: 14px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 50px;
    transition: width 1s ease;
  }
  .bar-fill.dog { background: linear-gradient(90deg, #FF9F1C, #FFD93D); }
  .bar-fill.cat { background: linear-gradient(90deg, #C77DFF, #FF6B9D); }

  /* ── FLOATING EMOJIS ── */
  .floaty {
    position: fixed;
    font-size: 2rem;
    opacity: 0.4;
    pointer-events: none;
    animation: floatUp linear infinite;
    z-index: 0;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.4; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
  }

  /* ── TIPS ── */
  .tip-box {
    background: linear-gradient(135deg, #FFF0F5, #FFF9E6);
    border-radius: 16px;
    padding: 16px 20px;
    font-family: 'Jua', sans-serif;
    font-size: 0.95rem;
    color: #888;
    margin-top: 16px;
    border-left: 4px solid #FFD93D;
    text-align: left;
  }
</style>
</head>
<body>

<!-- FLOATING EMOJIS -->
<span class="floaty" style="left:5%;animation-duration:8s;animation-delay:0s;">🐶</span>
<span class="floaty" style="left:20%;animation-duration:11s;animation-delay:2s;">🐱</span>
<span class="floaty" style="left:40%;animation-duration:9s;animation-delay:4s;">🐾</span>
<span class="floaty" style="left:60%;animation-duration:12s;animation-delay:1s;">⭐</span>
<span class="floaty" style="left:80%;animation-duration:10s;animation-delay:3s;">💖</span>
<span class="floaty" style="left:90%;animation-duration:7s;animation-delay:5s;">🌟</span>

<!-- HEADER -->
<div class="header">
  <a href="index.html" class="back-btn">← 하윤이 홈으로</a>
  <div class="header-title">🐶 동물상 테스트 🐱</div>
  <div class="header-sub">나는 강아지상일까? 고양이상일까? AI가 알아봐줄게! ✨</div>
</div>

<div class="main">

  <!-- STEP 1 -->
  <div class="step-card" id="test-section">
    <div class="step-title">📸 얼굴 사진을 찍거나 올려줘!</div>
    <div class="step-desc">카메라로 찍거나 사진을 올리면 AI가 분석해줄게 🤖</div>

    <!-- 미리보기 영역 -->
    <div id="placeholder" class="cam-placeholder">
      <span>🐾</span>
      <p>여기에 얼굴이 나와요!</p>
    </div>
    <div id="webcam-wrap" style="display:none; margin: 0 auto 20px;"></div>
    <img id="upload-preview" alt="업로드 이미지" />

    <!-- 버튼들 -->
    <div class="btn-row">
      <button class="btn-main" id="cam-btn" onclick="startWebcam()">
        📷 카메라로 찍기
      </button>
      <label class="upload-label" for="file-input">
        🖼️ 사진 올리기
      </label>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleUpload(event)">
    </div>

    <div id="analyze-row" style="display:none;">
      <div class="btn-row">
        <button class="btn-main" id="analyze-btn" onclick="analyzeWebcam()">
          🔍 분석하기!
        </button>
        <button class="btn-outline" onclick="resetAll()">
          🔄 다시하기
        </button>
      </div>
    </div>

    <div class="loading" id="loading">🤖 AI가 열심히 분석 중이에요...</div>

    <div class="tip-box">
      💡 <strong>잘 나오는 팁!</strong> 얼굴이 잘 보이게 정면을 봐줘~ 빛이 밝은 곳이 좋아!
    </div>
  </div>

  <!-- RESULT -->
  <div id="result-section">
    <div class="result-card">
      <div class="result-animal" id="result-emoji"></div>
      <div class="result-title" id="result-title"></div>
      <div class="result-badge" id="result-badge"></div>

      <div class="confidence-wrap">
        <div class="confidence-label">📊 AI 분석 결과</div>
        <div class="bar-row">
          <div class="bar-name">
            <span>🐶 강아지상</span>
            <span id="dog-pct">0%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill dog" id="dog-bar" style="width:0%"></div>
          </div>
        </div>
        <div class="bar-row">
          <div class="bar-name">
            <span>🐱 고양이상</span>
            <span id="cat-pct">0%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill cat" id="cat-bar" style="width:0%"></div>
          </div>
        </div>
      </div>

      <ul class="result-desc" id="result-desc"></ul>

      <div class="btn-row">
        <button class="btn-outline" onclick="resetAll()">🔄 다시 테스트하기</button>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/3EmJIELVU/";
let model = null;
let webcam = null;
let mode = null; // 'webcam' | 'upload'

const DOG_INFO = {
  emoji: "🐶",
  titleClass: "dog",
  badgeClass: "dog",
  badge: "충성스럽고 활발한 강아지상!",
  descs: [
    "💛 친구들한테 먼저 다가가는 편이야!",
    "🎉 같이 뛰어 놀 때 제일 신나~",
    "🍖 맛있는 거 나눠먹는 걸 좋아해!",
    "😊 웃을 때 눈이 반달처럼 휘어져!",
    "🐾 한번 친해지면 진짜 찐친이 되는 타입!"
  ]
};
const CAT_INFO = {
  emoji: "🐱",
  titleClass: "cat",
  badgeClass: "cat",
  badge: "도도하고 귀여운 고양이상!",
  descs: [
    "💜 처음엔 낯가리지만 친해지면 최고야!",
    "🌙 혼자만의 시간도 좋아하는 편이야~",
    "🎨 뭔가 만들거나 그리는 걸 즐겨!",
    "😌 표정이 시크해 보여도 사실 엄청 감성적!",
    "🐾 나만 알아볼 수 있는 매력 뿜뿜!"
  ]
};

async function loadModel() {
  if (!model) {
    document.getElementById('loading').style.display = 'block';
    model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
    document.getElementById('loading').style.display = 'none';
  }
}

async function startWebcam() {
  try {
    await loadModel();
    if (webcam) { webcam.stop(); webcam = null; }
    webcam = new tmImage.Webcam(280, 280, true);
    await webcam.setup();
    await webcam.play();
    mode = 'webcam';

    const wrap = document.getElementById('webcam-wrap');
    wrap.innerHTML = '';
    wrap.appendChild(webcam.canvas);
    wrap.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('upload-preview').style.display = 'none';
    document.getElementById('analyze-row').style.display = 'block';
    document.getElementById('cam-btn').textContent = '📷 다시 찍기';

    // 계속 업데이트 (미리보기용)
    function loop() {
      if (webcam && mode === 'webcam') {
        webcam.update();
        requestAnimationFrame(loop);
      }
    }
    loop();
  } catch(e) {
    alert('카메라를 사용할 수 없어요! 📸\n사진 올리기를 이용해줘~ 😊');
  }
}

function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const img = document.getElementById('upload-preview');
    img.src = ev.target.result;
    img.style.display = 'block';
    img.style.margin = '0 auto 20px';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('webcam-wrap').style.display = 'none';
    if (webcam) { webcam.stop(); webcam = null; }
    mode = 'upload';
    document.getElementById('analyze-row').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function analyzeWebcam() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('analyze-btn').disabled = true;
  try {
    await loadModel();
    let predictions;
    if (mode === 'webcam' && webcam) {
      predictions = await model.predict(webcam.canvas);
    } else if (mode === 'upload') {
      const img = document.getElementById('upload-preview');
      predictions = await model.predict(img);
    } else {
      alert('먼저 카메라나 사진을 선택해줘! 😊');
      return;
    }
    showResult(predictions);
  } catch(e) {
    alert('분석 중 오류가 났어요! 다시 시도해줘~ 😢');
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyze-btn').disabled = false;
  }
}

function showResult(predictions) {
  // 강아지/고양이 확률 찾기
  let dogScore = 0, catScore = 0;
  predictions.forEach(p => {
    const name = p.className.toLowerCase();
    if (name.includes('dog') || name.includes('강아지')) dogScore = p.probability;
    else if (name.includes('cat') || name.includes('고양이')) catScore = p.probability;
    else {
      // 첫번째 클래스 = dog, 두번째 = cat 기본 가정
      if (predictions.indexOf(p) === 0) dogScore = p.probability;
      else catScore = p.probability;
    }
  });

  const isDog = dogScore >= catScore;
  const info = isDog ? DOG_INFO : CAT_INFO;
  const winScore = Math.round((isDog ? dogScore : catScore) * 100);

  // 결과 채우기
  document.getElementById('result-emoji').textContent = info.emoji;
  const titleEl = document.getElementById('result-title');
  titleEl.textContent = isDog ? '강아지상!' : '고양이상!';
  titleEl.className = 'result-title ' + info.titleClass;
  const badgeEl = document.getElementById('result-badge');
  badgeEl.textContent = info.badge;
  badgeEl.className = 'result-badge ' + info.badgeClass;

  const descEl = document.getElementById('result-desc');
  descEl.innerHTML = info.descs.map(d => `<li>${d}</li>`).join('');

  // 바 애니메이션
  const dogPct = Math.round(dogScore * 100);
  const catPct = Math.round(catScore * 100);
  setTimeout(() => {
    document.getElementById('dog-bar').style.width = dogPct + '%';
    document.getElementById('cat-bar').style.width = catPct + '%';
    document.getElementById('dog-pct').textContent = dogPct + '%';
    document.getElementById('cat-pct').textContent = catPct + '%';
  }, 100);

  // 웹캠 멈추기
  if (webcam) { webcam.stop(); webcam = null; }

  // 화면 전환
  document.getElementById('test-section').style.display = 'none';
  document.getElementById('result-section').style.display = 'block';
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  if (webcam) { webcam.stop(); webcam = null; }
  mode = null;
  document.getElementById('test-section').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('webcam-wrap').style.display = 'none';
  document.getElementById('webcam-wrap').innerHTML = '';
  document.getElementById('upload-preview').style.display = 'none';
  document.getElementById('upload-preview').src = '';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('analyze-row').style.display = 'none';
  document.getElementById('cam-btn').textContent = '📷 카메라로 찍기';
  document.getElementById('dog-bar').style.width = '0%';
  document.getElementById('cat-bar').style.width = '0%';
  document.getElementById('file-input').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
